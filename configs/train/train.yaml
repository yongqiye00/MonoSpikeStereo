# Training preset.
# Usage:
#   python train.py --config configs/train/train.yaml

npz_path: data/train_npz
log_dir: runs/monospikestereo
checkpoint_dir: checkpoints

name: monospikestereo
net_type: flow
device: cuda

# Fine-tune starts from model weights only. Optimizer/scheduler/epoch are reset.
resume: false
resume_path: null
init_checkpoint: null

batch_size: 4
num_workers: 8
epochs: 200
save_every_epochs: 5
max_train_samples: 0
max_val_batches: 0
lr: 1.0e-5
grad_clip_norm: 1.0

sequence_length: 32
train_clip_stride: 8
state_history: 4
crop_size: 128x256

amp: false
amp_dtype: fp16
compile: false
